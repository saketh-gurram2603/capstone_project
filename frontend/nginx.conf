# nginx config for the frontend container.
# Serves the built SPA and reverse-proxies API calls to the backend service so
# the production build behaves like the Vite dev proxy (which only runs under
# `npm run dev`). "backend" resolves via the docker-compose network.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API namespace (all routers are registered under API_PREFIX="/it-kb")
    location /it-kb/ {
        proxy_pass         http://backend:8000/it-kb/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Health probes are registered WITHOUT the API prefix
    location /health {
        proxy_pass         http://backend:8000/health;
        proxy_set_header   Host $host;
    }

    # SPA fallback — any non-asset path serves index.html for client routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
